<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GeoGebra → AR (Quest 3)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; overflow:hidden; background:#080b0f; color:#dce7f0; font-family: system-ui, sans-serif; }
  canvas { display:block; }

  #ui {
    position:fixed; left:16px; top:16px; z-index:20; width:340px;
    background:rgba(11,17,24,.94); border:1px solid #2a3c4e; border-radius:10px;
    padding:16px; font-size:13px; line-height:1.5;
  }
  #ui h1 { margin:0 0 4px; font-size:15px; color:#5fd0d8; }
  #ui p.sub { margin:0 0 14px; color:#8098ac; font-size:12px; }
  .row { margin:12px 0; }
  .lbl { display:flex; justify-content:space-between; font-size:12px; color:#93a9bc; margin-bottom:5px; }
  .lbl b { color:#f0a35c; font-variant-numeric: tabular-nums; }
  input[type=range] { width:100%; accent-color:#5fd0d8; }
  input[type=file] { width:100%; font-size:12px; color:#93a9bc; }
  #status { margin-top:12px; padding-top:12px; border-top:1px solid #24333f;
            color:#8098ac; font-size:11.5px; }
  #status b { color:#dce7f0; }
</style>
</head>
<body>

<div id="ui">
  <h1>GeoGebra → AR</h1>
  <p class="sub">Φόρτωσε ένα αρχείο <b>.stl</b> από το GeoGebra και τοποθέτησέ το στην τάξη σου.</p>

  <div class="row">
    <div class="lbl"><span>Αρχείο STL</span></div>
    <input id="file" type="file" accept=".stl">
  </div>

  <div class="row">
    <div class="lbl"><span>Πραγματικό μέγεθος</span><b id="sizeOut">40 cm</b></div>
    <input id="size" type="range" min="5" max="250" value="40" step="5">
  </div>

  <div class="row">
    <div class="lbl"><span>Διαφάνεια</span><b id="opOut">100%</b></div>
    <input id="op" type="range" min="15" max="100" value="100" step="5">
  </div>

  <div id="status">
    <b>Quest 3:</b> πάτησε <em>Enter AR</em> κάτω δεξιά, στόχευσε τραπέζι ή πάτωμα, τράβα τη <b>σκανδάλη</b> για τοποθέτηση.<br>
    <b>Μοχλάκι ←→</b> περιστροφή · <b>↑↓</b> μέγεθος · <b>Grip</b> επανατοποθέτηση.
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { STLLoader }    from 'three/addons/loaders/STLLoader.js';
import { ARButton }     from 'three/addons/webxr/ARButton.js';
import { OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.01, 50);
camera.position.set(0.5, 0.4, 0.8);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
  requiredFeatures: ['hit-test'], optionalFeatures: ['local-floor']
}));

scene.add(new THREE.HemisphereLight(0xffffff, 0x33444f, 2.4));
const d1 = new THREE.DirectionalLight(0xffffff, 1.6); d1.position.set(1,2,1);  scene.add(d1);
const d2 = new THREE.DirectionalLight(0x88bbff, 0.6); d2.position.set(-1,1,-1); scene.add(d2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.2, 0);

// --- Ρίζα: εδώ μπαίνει το μοντέλο, κεντραρισμένο και κλιμακωμένο σε μέτρα ---
const root  = new THREE.Group(); scene.add(root);
const pivot = new THREE.Group(); root.add(pivot);   // περιστροφή γύρω από το κέντρο

const material = new THREE.MeshStandardMaterial({
  color: 0xf0913c, roughness: 0.42, metalness: 0.05,
  side: THREE.DoubleSide, transparent: false, opacity: 1
});

let mesh = null, baseScale = 1, targetSize = 0.40, spin = 0;

function loadGeometry(geom) {
  if (mesh) { pivot.remove(mesh); mesh.geometry.dispose(); }

  geom.computeVertexNormals();
  geom.center();                                   // κεντράρισμα στην αρχή των αξόνων
  geom.computeBoundingBox();
  const s = new THREE.Vector3();
  geom.boundingBox.getSize(s);
  const maxDim = Math.max(s.x, s.y, s.z) || 1;
  baseScale = 1 / maxDim;                          // → μέγιστη διάσταση = 1 μονάδα

  mesh = new THREE.Mesh(geom, material);
  mesh.rotation.x = -Math.PI/2;                    // το STL έρχεται με Z «πάνω»
  pivot.add(mesh);
  applyScale();
  document.getElementById('status').innerHTML =
    `<b>Φορτώθηκε.</b> Πάτησε <em>Enter AR</em> και τοποθέτησέ το.`;
}

function applyScale() {
  const k = baseScale * targetSize;
  pivot.scale.setScalar(k);
  // ανασήκωμα ώστε να ακουμπά στην επιφάνεια
  pivot.position.y = targetSize / 2;
}

// --- Παράδειγμα-πρότυπο αν δεν φορτωθεί αρχείο ---
{
  const pts = [];
  for (let i = 0; i <= 60; i++) { const x = 4*i/60; pts.push(new THREE.Vector2(Math.sqrt(x), x)); }
  const g = new THREE.LatheGeometry(pts, 48).rotateZ(-Math.PI/2).rotateX(Math.PI/2);
  loadGeometry(g);
}

// --- Φόρτωση αρχείου ---
document.getElementById('file').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try { loadGeometry(new STLLoader().parse(r.result)); }
    catch (err) { document.getElementById('status').innerHTML =
      `<b style="color:#e0703c">Δεν διαβάστηκε το αρχείο.</b> Βεβαιώσου ότι είναι .stl από το GeoGebra.`; }
  };
  r.readAsArrayBuffer(f);
};

// --- Μοντέλο από URL:  ?model=solid.stl ---
const q = new URLSearchParams(location.search).get('model');
if (q) new STLLoader().load(q, loadGeometry);

// --- Χειριστήρια οθόνης ---
const sizeR = document.getElementById('size'), sizeOut = document.getElementById('sizeOut');
sizeR.oninput = () => { targetSize = +sizeR.value/100; sizeOut.textContent = `${sizeR.value} cm`; applyScale(); };

const opR = document.getElementById('op'), opOut = document.getElementById('opOut');
opR.oninput = () => {
  const v = +opR.value/100;
  material.opacity = v; material.transparent = v < 1; material.depthWrite = v > 0.9;
  material.needsUpdate = true; opOut.textContent = `${opR.value}%`;
};

// ================= AR: τοποθέτηση σε πραγματική επιφάνεια =================
const reticle = new THREE.Mesh(
  new THREE.RingGeometry(0.08, 0.1, 40).rotateX(-Math.PI/2),
  new THREE.MeshBasicMaterial({ color: 0x5fd0d8 })
);
reticle.matrixAutoUpdate = false; reticle.visible = false;
scene.add(reticle);

let hitSource = null, hitRequested = false, placed = false;

[0,1].forEach(i => {
  const c = renderer.xr.getController(i);
  c.addEventListener('select', () => {
    if (reticle.visible) { root.position.setFromMatrixPosition(reticle.matrix); placed = true; }
  });
  c.addEventListener('squeeze', () => { placed = false; });   // grip → ξανατοποθέτηση
  scene.add(c);
});

let cool = 0;
function sticks(dt) {
  cool -= dt;
  const s = renderer.xr.getSession(); if (!s) return;
  for (const src of s.inputSources) {
    const gp = src.gamepad; if (!gp || gp.axes.length < 4) continue;
    const ax = gp.axes[2] ?? 0, ay = gp.axes[3] ?? 0;
    if (Math.abs(ax) > 0.15) spin += ax * dt * 1.6;            // περιστροφή
    if (Math.abs(ay) > 0.5 && cool <= 0) {                     // μέγεθος
      targetSize = Math.min(2.5, Math.max(0.05, targetSize * (ay < 0 ? 1.08 : 0.926)));
      sizeR.value = Math.round(targetSize*100);
      sizeOut.textContent = `${Math.round(targetSize*100)} cm`;
      applyScale(); cool = 0.06;
    }
  }
}

const clock = new THREE.Clock();

renderer.setAnimationLoop((t, frame) => {
  const dt = clock.getDelta();

  if (frame) {
    const s  = renderer.xr.getSession();
    const rs = renderer.xr.getReferenceSpace();
    if (!hitRequested) {
      s.requestReferenceSpace('viewer').then(v =>
        s.requestHitTestSource({ space: v }).then(h => { hitSource = h; }));
      s.addEventListener('end', () => { hitRequested = false; hitSource = null; });
      hitRequested = true;
    }
    if (hitSource && !placed) {
      const hits = frame.getHitTestResults(hitSource);
      if (hits.length) {
        reticle.visible = true;
        reticle.matrix.fromArray(hits[0].getPose(rs).transform.matrix);
      } else reticle.visible = false;
    } else reticle.visible = false;
    sticks(dt);
  } else {
    controls.update();
  }

  pivot.rotation.y = spin;
  renderer.render(scene, camera);
});

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
